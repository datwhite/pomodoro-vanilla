<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Vanilla Pomodoro</h1>

    <div class="ring-wrapper">
      <svg class="ring-svg" viewBox="0 0 380 380">
        <circle class="ring-track" cx="190" cy="190" r="168" />
        <circle
          class="ring-progress"
          id="progressRing"
          cx="190"
          cy="190"
          r="168"
          stroke-dasharray="1055.6"
          stroke-dashoffset="0"
        />
      </svg>

      <div class="inner">
        <div class="modes">
          <button class="mode-btn active" data-minutes="25">25 мин</button>
          <button class="mode-btn" data-minutes="5">5 мин</button>
          <button class="mode-btn" data-minutes="15">15 мин</button>
        </div>

        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-label" id="timerLabel">фокус</div>

        <button class="control-btn" id="controlBtn">Старт</button>
      </div>
    </div>

    <!-- <button id="testSound">thumb</button>
    <button id="testBell">bell</button> -->

    <script src="script2.js"></script>
  </body>
</html>
